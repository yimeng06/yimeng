<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #a8d8ea 0%, #aa96da 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        #taskInput {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        #prioritySelect {
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 0.95rem;
            cursor: pointer;
            background: white;
            transition: all 0.3s ease;
            outline: none;
        }

        #prioritySelect:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #taskInput::placeholder {
            color: #adb5bd;
        }

        #taskInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #addButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #addButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #addButton:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: white;
            border: 2px solid #e9ecef;
            border-left: 5px solid #667eea;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .task-item.priority-high {
            border-left-color: #dc3545;
        }

        .task-item.priority-medium {
            border-left-color: #ffc107;
        }

        .task-item.priority-low {
            border-left-color: #28a745;
        }

        .task-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-text {
            font-size: 1rem;
            color: #333;
            word-break: break-word;
        }

        .task-priority {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            width: fit-content;
            display: inline-block;
        }

        .priority-high-badge {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .priority-medium-badge {
            background: rgba(255, 193, 7, 0.2);
            color: #ff9800;
        }

        .priority-low-badge {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #adb5bd;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-button {
            padding: 8px 12px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .edit-button {
            background: #007bff;
            color: white;
        }

        .edit-button:hover {
            background: #0056b3;
        }

        .delete-button {
            background: #dc3545;
            color: white;
        }

        .delete-button:hover {
            background: #c82333;
        }

        .action-button:hover {
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.2rem;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .clear-button {
            padding: 10px 20px;
            background: #ffc107;
            color: #333;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .clear-button:hover {
            background: #ffb300;
            transform: scale(1.05);
        }

        .clear-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .clear-all-button {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }

        .clear-all-button:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .modal-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .modal-message {
            color: #6c757d;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-button {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-confirm {
            background: #e74c3c;
            color: white;
        }

        .modal-confirm:hover {
            background: #c0392b;
        }

        .modal-cancel {
            background: #e9ecef;
            color: #333;
        }

        .modal-cancel:hover {
            background: #dee2e6;
        }

        .edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .edit-modal.active {
            display: flex;
        }

        .edit-modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .edit-modal-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .edit-modal-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .edit-modal-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .edit-modal-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
            cursor: pointer;
        }

        .edit-modal-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .edit-modal-buttons {
            display: flex;
            gap: 10px;
        }

        .edit-modal-save {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .edit-modal-save:hover {
            background: #5568d3;
        }

        .edit-modal-cancel {
            flex: 1;
            padding: 12px;
            background: #e9ecef;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .edit-modal-cancel:hover {
            background: #dee2e6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .input-section {
                flex-direction: column;
            }

            #addButton {
                width: 100%;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .task-item {
                padding: 15px;
            }

            .task-text {
                font-size: 1rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-clipboard-list"></i> 我的待办清单</h1>
        <p class="subtitle">记录你的每一个小目标</p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="今天要做什么？" />
            <select id="prioritySelect">
                <option value="low">低优先级</option>
                <option value="medium" selected>中优先级</option>
                <option value="high">高优先级</option>
            </select>
            <button id="addButton">
                <i class="fas fa-plus"></i> 添加任务
            </button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">总任务</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedCount">0</span>
                <span class="stat-label">已完成</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingCount">0</span>
                <span class="stat-label">未完成</span>
            </div>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-clipboard-check"></i>
            <p>暂无任务，添加一个开始吧！</p>
        </div>

        <div class="action-bar" id="actionBar" style="display: none;">
            <button class="clear-button" id="clearButton" onclick="clearCompleted()">
                <i class="fas fa-trash"></i> 清空已完成
            </button>
            <button class="clear-all-button" id="clearAllButton" onclick="openClearAllModal()">
                <i class="fas fa-ban"></i> 全部清空
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title">确认清空？</div>
            <div class="modal-message">此操作将删除所有任务，且无法撤销。</div>
            <div class="modal-buttons">
                <button class="modal-button modal-cancel" onclick="closeClearAllModal()">取消</button>
                <button class="modal-button modal-confirm" onclick="confirmClearAll()">确认清空</button>
            </div>
        </div>
    </div>

    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <div class="edit-modal-title">编辑任务</div>
            <input type="text" class="edit-modal-input" id="editTaskInput" placeholder="任务内容" />
            <select class="edit-modal-select" id="editPrioritySelect">
                <option value="low">低优先级</option>
                <option value="medium" selected>中优先级</option>
                <option value="high">高优先级</option>
            </select>
            <div class="edit-modal-buttons">
                <button class="edit-modal-cancel" onclick="closeEditModal()">取消</button>
                <button class="edit-modal-save" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let editingTaskId = null;

        // 从本地存储加载任务
        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                renderTasks();
            } else {
                updateEmptyState();
            }
        }

        // 保存任务到本地存储
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // 添加任务
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            const priority = document.getElementById('prioritySelect').value;

            if (taskText === '') {
                input.focus();
                return;
            }

            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                priority: priority
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            input.value = '';
            input.focus();
        }

        // 切换任务完成状态
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        // 删除任务
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        // 获取优先级对应的中文名称和样式
        function getPriorityInfo(priority) {
            const map = {
                high: { name: '高优先级', className: 'priority-high' },
                medium: { name: '中优先级', className: 'priority-medium' },
                low: { name: '低优先级', className: 'priority-low' }
            };
            return map[priority] || map['medium'];
        }

        // 渲染任务列表
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                updateEmptyState();
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            tasks.forEach(task => {
                const li = document.createElement('li');
                const priorityInfo = getPriorityInfo(task.priority);
                li.className = `task-item fade-in ${task.completed ? 'completed' : ''} priority-${task.priority || 'medium'}`;

                li.innerHTML = `
                    <input
                        type="checkbox"
                        class="task-checkbox"
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    />
                    <div class="task-content">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <span class="task-priority ${priorityInfo.className}-badge">${priorityInfo.name}</span>
                    </div>
                    <div class="task-actions">
                        <button class="action-button edit-button" onclick="openEditModal(${task.id})">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="action-button delete-button" onclick="deleteTask(${task.id})">
                            <i class="fas fa-trash-alt"></i> 删除
                        </button>
                    </div>
                `;

                taskList.appendChild(li);
            });

            updateStats();
            updateActionBar();
        }

        // 更新统计数据
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // 更新空状态显示
        function updateEmptyState() {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('actionBar').style.display = 'none';
            updateStats();
        }

        // 更新操作栏显示
        function updateActionBar() {
            const hasCompleted = tasks.some(t => t.completed);
            const actionBar = document.getElementById('actionBar');
            const clearButton = document.getElementById('clearButton');

            if (hasCompleted) {
                actionBar.style.display = 'flex';
                clearButton.disabled = false;
            } else {
                actionBar.style.display = 'none';
                clearButton.disabled = true;
            }
        }

        // 清空已完成的任务
        function clearCompleted() {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            renderTasks();
        }

        // 打开确认清空对话框
        function openClearAllModal() {
            document.getElementById('confirmModal').classList.add('active');
        }

        // 关闭确认清空对话框
        function closeClearAllModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        // 确认清空所有任务
        function confirmClearAll() {
            tasks = [];
            saveTasks();
            renderTasks();
            closeClearAllModal();
        }

        // 打开编辑模态框
        function openEditModal(id) {
            editingTaskId = id;
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('editTaskInput').value = task.text;
                document.getElementById('editPrioritySelect').value = task.priority || 'medium';
                document.getElementById('editModal').classList.add('active');
                document.getElementById('editTaskInput').focus();
            }
        }

        // 关闭编辑模态框
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingTaskId = null;
        }

        // 保存编辑
        function saveEdit() {
            if (editingTaskId === null) return;

            const newText = document.getElementById('editTaskInput').value.trim();
            const newPriority = document.getElementById('editPrioritySelect').value;

            if (newText === '') {
                document.getElementById('editTaskInput').focus();
                return;
            }

            const task = tasks.find(t => t.id === editingTaskId);
            if (task) {
                task.text = newText;
                task.priority = newPriority;
                saveTasks();
                renderTasks();
                closeEditModal();
            }
        }

        // HTML 转义，防止 XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        document.getElementById('addButton').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.getElementById('editTaskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                saveEdit();
            }
        });

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeClearAllModal();
            }
        });

        // 页面加载时初始化
        loadTasks();
    </script>
</body>
</html>
